<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo-maiko-icone.png">
<title>MaïkoMarket — Chine → Afrique de l'Ouest</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
.app { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: #F6F6F8; color: #1A1A1A; min-height: 100vh; }
.topbar { background: #fff; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
.topbar-inner { max-width: 1240px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 12px 16px; }
.logo { display: flex; align-items: center; gap: 8px; cursor: pointer; white-space: nowrap; }
.logo-mark { background: linear-gradient(135deg,#FF6A00,#FF2D78); color: #fff; width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; font-size: 22px; font-weight: 700; }
.logo-text { font-size: 22px; font-weight: 800; color: #FF6A00; }
.logo-accent { color: #1A1A1A; }
.searchbar { flex: 1; display: flex; border: 2px solid #FF6A00; border-radius: 24px; overflow: hidden; background: #fff; }
.searchbar input { flex: 1; border: none; outline: none; padding: 10px 18px; font-size: 15px; background: transparent; }
.search-btn { background: #FF6A00; color: #fff; border: none; padding: 0 24px; font-weight: 700; cursor: pointer; font-size: 14px; }
.cart-icon { position: relative; font-size: 24px; background: none; border: none; cursor: pointer; padding: 6px; }
.cart-count { position: absolute; top: -2px; right: -6px; background: #FF2D78; color: #fff; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: grid; place-items: center; padding: 0 4px; }
.ticker { background: linear-gradient(90deg,#FFF4EC,#FFECF4); display: flex; gap: 32px; padding: 7px 16px; font-size: 12.5px; font-weight: 600; color: #B8430C; overflow-x: auto; max-width: 1240px; margin: 0 auto; }
.ticker span { white-space: nowrap; }
.catnav { max-width: 1240px; margin: 0 auto; display: flex; gap: 8px; padding: 14px 16px 4px; overflow-x: auto; }
.chip { white-space: nowrap; border: 1.5px solid #E2E2E8; background: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: .15s; color: #444; }
.chip:hover { border-color: #FF6A00; color: #FF6A00; }
.chip.active { background: #1A1A1A; color: #fff; border-color: #1A1A1A; }
.hero { max-width: 1240px; margin: 16px auto; padding: 0 16px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
.hero-text { background: linear-gradient(135deg,#1A1A1A,#3a1d10); color: #fff; border-radius: 18px; padding: 36px; display: flex; flex-direction: column; justify-content: center; }
.hero-eyebrow { font-size: 12px; letter-spacing: 2px; color: #FFB07A; font-weight: 700; margin-bottom: 12px; }
.hero-text h1 { font-size: 34px; line-height: 1.15; font-weight: 800; margin-bottom: 14px; }
.hero-text p { color: #D8C8BC; font-size: 15px; margin-bottom: 22px; max-width: 460px; }
.hero-cta { align-self: flex-start; background: linear-gradient(135deg,#FF6A00,#FF2D78); color: #fff; border: none; padding: 13px 28px; border-radius: 24px; font-weight: 700; font-size: 15px; cursor: pointer; }
.hero-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.hero-tile { border-radius: 16px; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-weight: 700; cursor: pointer; font-size: 15px; transition: transform .15s; min-height: 90px; }
.hero-tile:hover { transform: translateY(-3px); }
.flash, .catalog { max-width: 1240px; margin: 0 auto 28px; padding: 0 16px; }
.flash-head, .catalog-head { display: flex; align-items: center; justify-content: space-between; margin: 22px 0 14px; flex-wrap: wrap; gap: 12px; }
.flash-head h2, .catalog-head h2 { font-size: 22px; font-weight: 800; }
.count { color: #999; font-weight: 600; font-size: 16px; }
.flash-timer { background: #FF2D78; color: #fff; padding: 5px 14px; border-radius: 14px; font-size: 12.5px; font-weight: 700; }
.filters { display: flex; gap: 10px; }
.filters select { border: 1.5px solid #E2E2E8; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 600; background: #fff; cursor: pointer; color: #333; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.card { background: #fff; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
.card-img { position: relative; aspect-ratio: 1; display: grid; place-items: center; }
.card-emoji { font-size: 64px; }
.badge-disc { position: absolute; top: 8px; left: 8px; background: #FF2D78; color: #fff; font-size: 12px; font-weight: 800; padding: 3px 8px; border-radius: 8px; }
.badge-b2b { position: absolute; top: 8px; right: 8px; background: #1A1A1A; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; letter-spacing: 1px; }
.card-body { padding: 10px 12px 12px; }
.card-name { font-size: 14px; font-weight: 600; line-height: 1.3; height: 36px; overflow: hidden; margin-bottom: 6px; }
.card-rate { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.card-sold { font-size: 11.5px; color: #999; }
.card-price-row { display: flex; align-items: flex-end; justify-content: space-between; }
.card-price { font-size: 16px; font-weight: 800; color: #FF2D78; }
.card-old { font-size: 12px; color: #BBB; text-decoration: line-through; margin-left: 6px; }
.add-btn { background: #FF6A00; color: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 20px; font-weight: 700; cursor: pointer; line-height: 1; }
.add-btn:hover { background: #FF2D78; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: grid; place-items: center; z-index: 100; padding: 16px; }
.modal { background: #fff; border-radius: 18px; max-width: 820px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; position: relative; max-height: 90vh; }
.modal-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.06); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; z-index: 2; }
.modal-img { display: grid; place-items: center; min-height: 320px; }
.modal-info { padding: 30px; overflow-y: auto; }
.modal-cat { font-size: 12px; color: #FF6A00; font-weight: 700; letter-spacing: .5px; text-transform: none; }
.modal-name { font-size: 24px; font-weight: 800; margin: 6px 0 12px; }
.modal-price { font-size: 28px; font-weight: 800; color: #FF2D78; margin-bottom: 16px; display: flex; align-items: center; flex-wrap: wrap; }
.modal-tag { background: #F0F0F5; border-radius: 10px; padding: 9px 12px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.qty-row { display: flex; align-items: center; justify-content: space-between; margin: 18px 0; }
.qty-ctrl { display: flex; align-items: center; border: 1.5px solid #E2E2E8; border-radius: 10px; overflow: hidden; }
.qty-ctrl button { border: none; background: #F6F6F8; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }
.qty-ctrl span { width: 44px; text-align: center; font-weight: 700; }
.qty-ctrl.small button { width: 28px; height: 28px; font-size: 15px; }
.qty-ctrl.small span { width: 32px; font-size: 14px; }
.buy-btn { width: 100%; background: linear-gradient(135deg,#FF6A00,#FF2D78); color: #fff; border: none; padding: 15px; border-radius: 26px; font-size: 16px; font-weight: 700; cursor: pointer; }
.buy-btn:hover { opacity: .92; }
.drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: .25s; z-index: 110; }
.drawer-bg.show { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; top: 0; right: 0; width: 400px; max-width: 90vw; height: 100%; background: #fff; z-index: 120; transform: translateX(100%); transition: .28s; display: flex; flex-direction: column; }
.drawer.open { transform: translateX(0); }
.drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px; border-bottom: 1px solid #EEE; }
.drawer-head h3 { font-size: 18px; }
.drawer-body { flex: 1; overflow-y: auto; padding: 12px 18px; }
.empty { text-align: center; color: #999; padding: 50px 20px; font-size: 14px; line-height: 1.6; }
.cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F0F0F0; }
.cart-thumb { width: 52px; height: 52px; border-radius: 10px; display: grid; place-items: center; font-size: 28px; }
.cart-name { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; }
.drawer-foot { padding: 18px; border-top: 1px solid #EEE; }
.total-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 16px; font-weight: 600; }
.total-val { color: #FF2D78; font-weight: 800; font-size: 20px; }
.footer { background: #1A1A1A; color: #CCC; margin-top: 40px; }
.footer-grid { max-width: 1240px; margin: 0 auto; padding: 40px 16px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 30px; }
.footer .logo-accent { color: #fff; }
.foot-p { font-size: 13px; line-height: 1.7; margin-top: 12px; max-width: 320px; color: #999; }
.footer h4 { color: #fff; font-size: 14px; margin-bottom: 12px; }
.footer p { font-size: 13px; padding: 4px 0; color: #999; cursor: pointer; }
.footer p:hover { color: #FF6A00; }
.foot-bottom { border-top: 1px solid #333; text-align: center; padding: 18px; font-size: 12.5px; color: #777; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: #fff; padding: 13px 26px; border-radius: 26px; font-weight: 600; font-size: 14px; z-index: 200; box-shadow: 0 6px 24px rgba(0,0,0,.3); }
@media (max-width: 760px) {
  .topbar-inner { flex-wrap: wrap; }
  .searchbar { order: 3; width: 100%; flex-basis: 100%; }
  .hero { grid-template-columns: 1fr; }
  .hero-text h1 { font-size: 26px; }
  .modal { grid-template-columns: 1fr; }
  .modal-img { min-height: 200px; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .search-btn { padding: 0 14px; }
}

.checkout-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: grid; place-items: center; z-index: 130; padding: 16px; overflow-y: auto; }
.checkout { background: #fff; border-radius: 18px; max-width: 540px; width: 100%; padding: 28px; position: relative; max-height: 92vh; overflow-y: auto; }
.checkout h2 { font-size: 22px; margin-bottom: 4px; }
.checkout .sub { color: #888; font-size: 13px; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
.field input, .field textarea { width: 100%; border: 1.5px solid #E2E2E8; border-radius: 10px; padding: 11px 13px; font-size: 14px; font-family: inherit; outline: none; }
.field input:focus, .field textarea:focus { border-color: #FF6A00; }
.field .req { color: #FF2D78; }
.pay-options { display: flex; flex-direction: column; gap: 10px; margin: 6px 0 18px; }
.pay-opt { border: 1.5px solid #E2E2E8; border-radius: 12px; padding: 13px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: .15s; }
.pay-opt:hover { border-color: #FF6A00; }
.pay-opt.active { border-color: #FF6A00; background: #FFF6F0; }
.pay-opt .ico { font-size: 22px; }
.pay-opt .txt { flex: 1; }
.pay-opt .txt b { display: block; font-size: 14px; }
.pay-opt .txt span { font-size: 12px; color: #888; }
.pay-opt .soon { font-size: 10px; font-weight: 700; background: #FFE0B2; color: #E65100; padding: 3px 7px; border-radius: 6px; }
.order-summary { background: #F8F8FA; border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; }
.order-summary .line { display: flex; justify-content: space-between; font-size: 13.5px; padding: 4px 0; }
.order-summary .line.tot { font-weight: 800; font-size: 17px; color: #FF2D78; border-top: 1px solid #E2E2E8; margin-top: 6px; padding-top: 10px; }
.success-box { text-align: center; padding: 20px 0; }
.success-box .check { font-size: 60px; }
.success-box h2 { margin: 10px 0; }
.success-box .num { background: #F0F0F5; border-radius: 10px; padding: 10px; font-weight: 700; margin: 14px 0; }
.loading-screen { display: grid; place-items: center; min-height: 60vh; color: #888; font-size: 15px; }
.spinner { width: 38px; height: 38px; border: 4px solid #FFE0CC; border-top-color: #FF6A00; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.stock-low { font-size: 11px; color: #E65100; font-weight: 700; }
.stock-out { font-size: 11px; color: #C62828; font-weight: 700; }


.logo img.brand-logo { height: 42px; width: auto; display: block; }
.topbar .logo img.brand-logo { height: 38px; }

.modal-gallery { display: flex; flex-direction: column; }
.thumbs { display: flex; gap: 8px; padding: 12px; flex-wrap: wrap; }
.thumb-mini { width: 56px; height: 56px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
.thumb-mini.active { border-color: #FF6A00; }
.thumb-mini img { width: 100%; height: 100%; object-fit: cover; }
@media (max-width: 760px) { .modal-gallery { order: -1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SUPABASE_URL = "https://hvziqwjgnwkgutrdsify.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2emlxd2pnbndrZ3V0cmRzaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTIxMjAsImV4cCI6MjA5NzI2ODEyMH0.AYicxr7MC-ho8tzwjOUkfq4c7cDzCO_HZYiV2d5P0lk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CATEGORIES = [
  { name: "BEAUTÉ & SOINS", short: "Beauté", emoji: "💄", color: "#F2789F" },
  { name: "MODE & VÊTEMENTS", short: "Mode", emoji: "👗", color: "#9B5DE5" },
  { name: "ÉLECTRONIQUE & HIGH-TECH", short: "High-Tech", emoji: "📱", color: "#00BBF9" },
  { name: "MAISON & CUISINE", short: "Maison", emoji: "🍳", color: "#FF8C42" },
  { name: "OUTILS & CONSTRUCTION", short: "Outils", emoji: "🔧", color: "#6C757D" },
  { name: "AGRICULTURE & ÉLEVAGE", short: "Agriculture", emoji: "🌾", color: "#43AA8B" },
  { name: "INDUSTRIE & ÉQUIPEMENTS", short: "Industrie", emoji: "🏭", color: "#577590" },
  { name: "COMMERCE & DISTRIBUTION", short: "Commerce", emoji: "🛒", color: "#F9C74F" },
];

const fmt = (n) => new Intl.NumberFormat("fr-FR").format(n) + " FCFA";
const fmtSold = (n) => (n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0", "") + "k" : n);

function Stars({ rating }) {
  return (
    <span style={{ color: "#FF7B00", fontSize: 12, letterSpacing: -1 }}>
      {"★".repeat(Math.round(rating))}
      <span style={{ color: "#E0E0E0" }}>{"★".repeat(5 - Math.round(rating))}</span>
    </span>
  );
}

function ProductImg({ p, className, big }) {
  if (p.photo_url) {
    return <div className={className} style={{ background: "#fff" }}>
      <img src={p.photo_url} alt={p.nom} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
    </div>;
  }
  return <div className={className} style={{ background: `linear-gradient(135deg, ${p.couleur}22, ${p.couleur}55)` }}>
    <span style={{ fontSize: big ? 120 : 64 }}>{p.emoji}</span>
  </div>;
}

function StockTag({ s }) {
  if (s <= 0) return <span className="stock-out">Rupture de stock</span>;
  if (s <= 5) return <span className="stock-low">Plus que {s} en stock !</span>;
  return null;
}

function ProductCard({ p, onOpen, onAdd }) {
  const out = p.quantite_stock <= 0;
  return (
    <div className="card" onClick={() => onOpen(p)}>
      <div className="card-img" style={{ position: "relative" }}>
        <ProductImg p={p} className="card-img" />
        {p.remise > 0 && <span className="badge-disc">-{p.remise}%</span>}
        {p.segment === "B2B" && <span className="badge-b2b">GROS</span>}
      </div>
      <div className="card-body">
        <div className="card-name">{p.nom}</div>
        <div className="card-rate">
          <Stars rating={p.note} />
          <span className="card-sold">{fmtSold(p.vendus)} vendus</span>
        </div>
        <StockTag s={p.quantite_stock} />
        <div className="card-price-row">
          <div>
            <span className="card-price">{fmt(p.prix)}</span>
            {p.ancien_prix > 0 && <span className="card-old">{fmt(p.ancien_prix)}</span>}
          </div>
          <button className="add-btn" disabled={out} style={out ? { background: "#ccc", cursor: "not-allowed" } : {}} onClick={(e) => { e.stopPropagation(); if (!out) onAdd(p); }}>+</button>
        </div>
      </div>
    </div>
  );
}

function ProductModal({ p, onClose, onAdd }) {
  const [qty, setQty] = useState(1);
  const [activeImg, setActiveImg] = useState(0);
  if (!p) return null;
  const out = p.quantite_stock <= 0;
  // Liste des images : photo principale + galerie
  const gallery = Array.isArray(p.galerie) ? p.galerie : [];
  const allImages = [p.photo_url, ...gallery].filter(Boolean);
  const hasPhotos = allImages.length > 0;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-gallery">
          {hasPhotos ? (
            <div className="modal-img" style={{ background: "#fff" }}>
              <img src={allImages[activeImg]} alt={p.nom} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            </div>
          ) : (
            <ProductImg p={p} className="modal-img" big />
          )}
          {allImages.length > 1 && (
            <div className="thumbs">
              {allImages.map((url, idx) => (
                <div key={idx} className={`thumb-mini ${idx === activeImg ? "active" : ""}`} onClick={() => setActiveImg(idx)}>
                  <img src={url} alt="" />
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-info">
          <div className="modal-cat">{p.categorie}{p.segment === "B2B" ? " · Vente en gros" : ""}</div>
          <h2 className="modal-name">{p.nom}</h2>
          <div className="card-rate" style={{ marginBottom: 12 }}>
            <Stars rating={p.note} />
            <span style={{ fontWeight: 700, color: "#333" }}>{p.note}</span>
            <span className="card-sold">· {fmtSold(p.vendus)} vendus</span>
          </div>
          <div className="modal-price">
            {fmt(p.prix)}
            {p.ancien_prix > 0 && <span className="card-old" style={{ fontSize: 16 }}>{fmt(p.ancien_prix)}</span>}
            {p.remise > 0 && <span className="badge-disc" style={{ position: "static", marginLeft: 8 }}>-{p.remise}%</span>}
          </div>
          <div style={{ marginBottom: 12 }}><StockTag s={p.quantite_stock} /></div>
          {p.recurrent && <div className="modal-tag">🔁 Réapprovisionnement facile</div>}
          <div className="modal-tag" style={{ background: "#E8F5E9", color: "#2E7D32" }}>🚚 Livraison Chine → Afrique de l'Ouest · 7-15 jours</div>
          <div className="qty-row">
            <span style={{ fontWeight: 600 }}>Quantité</span>
            <div className="qty-ctrl">
              <button onClick={() => setQty(Math.max(1, qty - 1))}>−</button>
              <span>{qty}</span>
              <button onClick={() => setQty(qty + 1)}>+</button>
            </div>
          </div>
          <button className="buy-btn" disabled={out} style={out ? { background: "#ccc" } : {}} onClick={() => { if (!out) { onAdd(p, qty); onClose(); } }}>
            {out ? "Indisponible" : `Ajouter au panier · ${fmt(p.prix * qty)}`}
          </button>
        </div>
      </div>
    </div>
  );
}

function CartDrawer({ open, items, onClose, setItems, onCheckout }) {
  const total = items.reduce((s, i) => s + i.prix * i.qty, 0);
  const setQty = (id, q) => setItems(items.map((i) => (i.id === id ? { ...i, qty: q } : i)).filter((i) => i.qty > 0));
  return (
    <React.Fragment>
      <div className={`drawer-bg ${open ? "show" : ""}`} onClick={onClose} />
      <div className={`drawer ${open ? "open" : ""}`}>
        <div className="drawer-head">
          <h3>Mon panier ({items.reduce((s, i) => s + i.qty, 0)})</h3>
          <button className="modal-close" style={{ position: "static" }} onClick={onClose}>✕</button>
        </div>
        <div className="drawer-body">
          {items.length === 0 && <div className="empty">Votre panier est vide.<br />Découvrez nos 200 produits !</div>}
          {items.map((i) => (
            <div className="cart-item" key={i.id}>
              <div className="cart-thumb" style={{ background: i.photo_url ? "#fff" : `${i.couleur}33`, overflow: "hidden" }}>
                {i.photo_url ? <img src={i.photo_url} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : i.emoji}
              </div>
              <div style={{ flex: 1 }}>
                <div className="cart-name">{i.nom}</div>
                <div className="card-price">{fmt(i.prix)}</div>
              </div>
              <div className="qty-ctrl small">
                <button onClick={() => setQty(i.id, i.qty - 1)}>−</button>
                <span>{i.qty}</span>
                <button onClick={() => setQty(i.id, i.qty + 1)}>+</button>
              </div>
            </div>
          ))}
        </div>
        {items.length > 0 && (
          <div className="drawer-foot">
            <div className="total-row"><span>Total</span><span className="total-val">{fmt(total)}</span></div>
            <button className="buy-btn" onClick={onCheckout}>Commander</button>
          </div>
        )}
      </div>
    </React.Fragment>
  );
}

function Checkout({ items, profil, onClose, onDone }) {
  const [step, setStep] = useState("form");
  const [nom, setNom] = useState(profil ? `${profil.prenom||""} ${profil.nom||""}`.trim() : "");
  const [tel, setTel] = useState(profil?.telephone || "");
  const [ville, setVille] = useState("");
  const [adresse, setAdresse] = useState(profil?.adresse_livraison || "");
  const [note, setNote] = useState("");
  const [pay, setPay] = useState("livraison");
  const [orderNum, setOrderNum] = useState(null);
  const [err, setErr] = useState("");
  const total = items.reduce((s, i) => s + i.prix * i.qty, 0);

  const submit = async () => {
    setErr("");
    if (!nom.trim() || !tel.trim()) { setErr("Le nom et le téléphone sont obligatoires."); return; }
    setStep("loading");
    try {
      const { data: cmd, error: e1 } = await sb.from("commandes").insert({
        client_nom: nom, client_tel: tel, client_ville: ville, client_adresse: adresse,
        total, mode_paiement: pay, note_client: note, statut: "en_attente"
      }).select().single();
      if (e1) throw e1;
      const lignes = items.map((i) => ({
        commande_id: cmd.id, produit_id: i.id, produit_nom: i.nom,
        prix_unitaire: i.prix, quantite: i.qty
      }));
      const { error: e2 } = await sb.from("lignes_commande").insert(lignes);
      if (e2) throw e2;

      // ===========================================================
      // EMPLACEMENT PAIEMENT FLUTTERWAVE (à brancher plus tard)
      // -----------------------------------------------------------
      // Quand ton compte marchand Flutterwave sera validé, c'est ICI
      // qu'on déclenchera le paiement réel, ex:
      //
      //   if (pay === "flutterwave") {
      //     const res = await fetch("/api/payer", {
      //       method: "POST",
      //       headers: { "Content-Type": "application/json" },
      //       body: JSON.stringify({ commande_id: cmd.id, total, client: { nom, tel } })
      //     });
      //     const { lien_paiement } = await res.json();
      //     window.location.href = lien_paiement; // redirige vers Flutterwave
      //     return;
      //   }
      //
      // La fonction /api/payer (Vercel) appellera Flutterwave côté
      // serveur avec la clé SECRÈTE, jamais exposée ici.
      // ===========================================================

      setOrderNum(cmd.numero);
      setStep("success");
      onDone();
    } catch (e) {
      setErr("Erreur lors de l'enregistrement : " + (e.message || e) + ". Réessayez.");
      setStep("form");
    }
  };

  return (
    <div className="checkout-overlay" onClick={step === "loading" ? null : onClose}>
      <div className="checkout" onClick={(e) => e.stopPropagation()}>
        {step !== "success" && <button className="modal-close" onClick={onClose}>✕</button>}

        {step === "loading" && (
          <div className="loading-screen"><div className="spinner" />Enregistrement de votre commande…</div>
        )}

        {step === "form" && (
          <React.Fragment>
            <h2>Finaliser la commande</h2>
            <div className="sub">Remplissez vos informations de livraison</div>

            <div className="order-summary">
              {items.map((i) => (
                <div className="line" key={i.id}><span>{i.qty}× {i.nom}</span><span>{fmt(i.prix * i.qty)}</span></div>
              ))}
              <div className="line tot"><span>Total</span><span>{fmt(total)}</span></div>
            </div>

            <div className="field"><label>Nom complet <span className="req">*</span></label>
              <input value={nom} onChange={(e) => setNom(e.target.value)} placeholder="Ex: Koffi Mensah" /></div>
            <div className="field"><label>Téléphone <span className="req">*</span></label>
              <input value={tel} onChange={(e) => setTel(e.target.value)} placeholder="Ex: +229 01 23 45 67" /></div>
            <div className="field"><label>Ville</label>
              <input value={ville} onChange={(e) => setVille(e.target.value)} placeholder="Ex: Cotonou" /></div>
            <div className="field"><label>Adresse de livraison</label>
              <input value={adresse} onChange={(e) => setAdresse(e.target.value)} placeholder="Quartier, repère…" /></div>
            <div className="field"><label>Note (facultatif)</label>
              <textarea value={note} onChange={(e) => setNote(e.target.value)} rows="2" placeholder="Instructions de livraison…" /></div>

            <label style={{ fontSize: 13, fontWeight: 600, color: "#444", display: "block", marginBottom: 8 }}>Mode de paiement</label>
            <div className="pay-options">
              <div className={`pay-opt ${pay === "livraison" ? "active" : ""}`} onClick={() => setPay("livraison")}>
                <span className="ico">💵</span>
                <span className="txt"><b>Paiement à la livraison</b><span>Payez en espèces à réception</span></span>
              </div>
              <div className={`pay-opt ${pay === "flutterwave" ? "active" : ""}`} onClick={() => setPay("flutterwave")}>
                <span className="ico">💳</span>
                <span className="txt"><b>Carte / Mobile Money</b><span>Paiement sécurisé en ligne</span></span>
                <span className="soon">BIENTÔT</span>
              </div>
            </div>

            {pay === "flutterwave" && (
              <div className="modal-tag" style={{ background: "#FFF3E0", color: "#E65100", marginBottom: 14 }}>
                ⏳ Le paiement en ligne sera activé prochainement. Pour l'instant, choisissez « paiement à la livraison ».
              </div>
            )}

            {err && <div className="modal-tag" style={{ background: "#FFEBEE", color: "#C62828", marginBottom: 14 }}>{err}</div>}

            <button className="buy-btn" disabled={pay === "flutterwave"} style={pay === "flutterwave" ? { background: "#ccc" } : {}} onClick={submit}>
              Valider la commande · {fmt(total)}
            </button>
          </React.Fragment>
        )}

        {step === "success" && (
          <div className="success-box">
            <div className="check">✅</div>
            <h2>Commande enregistrée !</h2>
            <p style={{ color: "#666" }}>Merci {nom}. Nous vous contacterons au {tel} pour confirmer.</p>
            <div className="num">Commande N° {orderNum}</div>
            <button className="buy-btn" onClick={onClose}>Continuer mes achats</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AccountModal({ onClose, onAuth, sb }) {
  const [mode, setMode] = useState("connexion");
  const [f, setF] = useState({ prenom:"", nom:"", telephone:"", email:"", password:"", adresse_residence:"", adresse_livraison:"" });
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const set = (k,v) => setF({...f,[k]:v});

  const inscrire = async () => {
    setErr("");
    if (!f.nom || !f.email || !f.password) { setErr("Nom, email et mot de passe obligatoires."); return; }
    if (f.password.length < 6) { setErr("Mot de passe : au moins 6 caractères."); return; }
    setBusy(true);
    try {
      const { data, error } = await sb.auth.signUp({ email: f.email, password: f.password });
      if (error) throw error;
      const uid = data.user?.id;
      if (uid) {
        await sb.from("profils").update({
          role: "client", statut: "actif",
          prenom: f.prenom, nom: f.nom, email: f.email, telephone: f.telephone,
          adresse_residence: f.adresse_residence, adresse_livraison: f.adresse_livraison
        }).eq("id", uid);
      }
      onAuth();
      onClose();
    } catch (e) { setErr(e.message || String(e)); }
    setBusy(false);
  };

  const connecter = async () => {
    setErr(""); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email: f.email, password: f.password });
    setBusy(false);
    if (error) { setErr("Identifiants incorrects."); return; }
    onAuth(); onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="checkout" onClick={(e)=>e.stopPropagation()} style={{maxWidth:440}}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>{mode==="connexion" ? "Connexion" : "Créer un compte"}</h2>
        <div className="sub">{mode==="connexion" ? "Accédez à votre compte client" : "Rejoignez MaïkoMarket"}</div>
        {err && <div className="modal-tag" style={{background:"#FFEBEE",color:"#C62828",marginBottom:14}}>{err}</div>}
        {mode==="inscription" && (
          <React.Fragment>
            <div className="field"><label>Prénom</label><input value={f.prenom} onChange={(e)=>set("prenom",e.target.value)} /></div>
            <div className="field"><label>Nom</label><input value={f.nom} onChange={(e)=>set("nom",e.target.value)} /></div>
            <div className="field"><label>Téléphone</label><input value={f.telephone} onChange={(e)=>set("telephone",e.target.value)} placeholder="+229 ..." /></div>
          </React.Fragment>
        )}
        <div className="field"><label>Email</label><input type="email" value={f.email} onChange={(e)=>set("email",e.target.value)} /></div>
        <div className="field"><label>Mot de passe</label><input type="password" value={f.password} onChange={(e)=>set("password",e.target.value)} /></div>
        {mode==="inscription" && (
          <React.Fragment>
            <div className="field"><label>Adresse de résidence</label><input value={f.adresse_residence} onChange={(e)=>set("adresse_residence",e.target.value)} placeholder="Où vous habitez" /></div>
            <div className="field"><label>Adresse de livraison</label><input value={f.adresse_livraison} onChange={(e)=>set("adresse_livraison",e.target.value)} placeholder="Où livrer vos colis" /></div>
          </React.Fragment>
        )}
        <button className="buy-btn" disabled={busy} onClick={mode==="connexion"?connecter:inscrire}>
          {busy ? "..." : (mode==="connexion" ? "Se connecter" : "Créer mon compte")}
        </button>
        <div style={{textAlign:"center",marginTop:14,fontSize:13.5}}>
          {mode==="connexion"
            ? <span>Pas de compte ? <a style={{color:"#FF6A00",cursor:"pointer",fontWeight:600}} onClick={()=>{setMode("inscription");setErr("");}}>S'inscrire</a></span>
            : <span>Déjà inscrit ? <a style={{color:"#FF6A00",cursor:"pointer",fontWeight:600}} onClick={()=>{setMode("connexion");setErr("");}}>Se connecter</a></span>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [products, setProducts] = useState([]);
  const [cats, setCats] = useState(CATEGORIES);
  const [user, setUser] = useState(null);
  const [profil, setProfil] = useState(null);
  const [accountOpen, setAccountOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const [loadErr, setLoadErr] = useState("");
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState("Tout");
  const [segment, setSegment] = useState("Tout");
  const [sort, setSort] = useState("populaire");
  const [modal, setModal] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkout, setCheckout] = useState(false);
  const [toast, setToast] = useState("");

  useEffect(() => {
    (async () => {
      const [{ data: pData, error: pErr }, { data: cData }] = await Promise.all([
        sb.from("produits").select("*").eq("actif", true),
        sb.from("categories").select("*").order("ordre")
      ]);
      if (pErr) { setLoadErr(pErr.message); setLoading(false); return; }
      setProducts(pData || []);
      if (cData && cData.length) {
        // Générer un libellé court à partir du nom complet
        setCats(cData.map(c => ({
          name: c.nom,
          short: c.nom.split(/[ &]/)[0].charAt(0) + c.nom.split(/[ &]/)[0].slice(1).toLowerCase(),
          emoji: c.emoji,
          color: c.couleur,
          photo: c.photo_url || ""
        })));
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    const loadProfil = async (u) => {
      if (!u) { setProfil(null); return; }
      const { data } = await sb.from("profils").select("*").eq("id", u.id).single();
      setProfil(data || null);
    };
    sb.auth.getSession().then(({ data }) => { setUser(data.session?.user || null); loadProfil(data.session?.user); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => { setUser(s?.user || null); loadProfil(s?.user); });
    return () => sub.subscription.unsubscribe();
  }, []);

  const addToCart = (p, qty = 1) => {
    setCart((c) => {
      const ex = c.find((i) => i.id === p.id);
      if (ex) return c.map((i) => (i.id === p.id ? { ...i, qty: i.qty + qty } : i));
      return [...c, { ...p, qty }];
    });
    setToast(`✓ ${p.nom} ajouté`);
    setTimeout(() => setToast(""), 1800);
  };

  const filtered = useMemo(() => {
    let r = products.filter((p) => {
      if (activeCat !== "Tout" && p.categorie !== activeCat) return false;
      if (segment !== "Tout" && p.segment !== segment) return false;
      if (search && !p.nom.toLowerCase().includes(search.toLowerCase()) && !p.categorie.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
    if (sort === "prix-bas") r = [...r].sort((a, b) => a.prix - b.prix);
    else if (sort === "prix-haut") r = [...r].sort((a, b) => b.prix - a.prix);
    else if (sort === "promo") r = [...r].sort((a, b) => b.remise - a.remise);
    else r = [...r].sort((a, b) => b.vendus - a.vendus);
    return r;
  }, [products, activeCat, segment, search, sort]);

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const deals = useMemo(() => [...products].filter((p) => p.remise >= 40).sort((a, b) => b.remise - a.remise).slice(0, 6), [products]);

  return (
    <div className="app">
      <header className="topbar">
        <div className="topbar-inner">
          <div className="logo" onClick={() => { setActiveCat("Tout"); setSegment("Tout"); setSearch(""); }}>
            <img className="brand-logo" src="logo-maiko-couleur.png" alt="MaïkoMarket" />
          </div>
          <div className="searchbar">
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Rechercher parmi nos produits..." />
            <button className="search-btn">Rechercher</button>
          </div>
          {user ? (
            <button className="cart-icon" title="Mon compte" onClick={() => sb.auth.signOut()} style={{fontSize:14,fontWeight:600,color:"#FF6A00"}}>
              {profil?.prenom || "Compte"} · Déconnexion
            </button>
          ) : (
            <button className="cart-icon" style={{fontSize:14,fontWeight:600}} onClick={() => setAccountOpen(true)}>Connexion</button>
          )}
          <button className="cart-icon" onClick={() => setCartOpen(true)}>
            🛒{cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
        <div className="ticker">
          <span>🚚 Livraison directe Chine → Bénin &amp; Nigeria</span>
          <span>💰 Prix grossiste imbattables</span>
          <span>✓ Paiement à la livraison disponible</span>
          <span>📦 Plus de 200 produits sélectionnés</span>
        </div>
      </header>

      <nav className="catnav">
        <button className={activeCat === "Tout" ? "chip active" : "chip"} onClick={() => setActiveCat("Tout")}>🏠 Tout</button>
        {cats.map((c) => (
          <button key={c.name} className={activeCat === c.name ? "chip active" : "chip"} onClick={() => setActiveCat(c.name)} style={activeCat === c.name ? { background: c.color, borderColor: c.color } : {}}>
            {c.photo
              ? <img src={c.photo} alt="" style={{ width: 20, height: 20, borderRadius: "50%", objectFit: "cover", verticalAlign: "middle", marginRight: 5 }} />
              : <span>{c.emoji} </span>}
            {c.short}
          </button>
        ))}
      </nav>

      {loading && <div className="loading-screen"><div className="spinner" />Chargement du catalogue…</div>}
      {loadErr && <div className="empty">Erreur de chargement : {loadErr}</div>}

      {!loading && !loadErr && (
        <React.Fragment>
          {activeCat === "Tout" && !search && (
            <React.Fragment>
              <section className="hero">
                <div className="hero-text">
                  <div className="hero-eyebrow">CHINE → AFRIQUE DE L'OUEST</div>
                  <h1>Les meilleurs produits, <br />directement au prix d'usine.</h1>
                  <p>Beauté, high-tech, maison, agriculture, équipements pros — sélectionnés pour le marché béninois et nigérian.</p>
                  <button className="hero-cta" onClick={() => setSort("promo")}>Voir les promotions 🔥</button>
                </div>
                <div className="hero-cards">
                  {cats.slice(0, 4).map((c) => (
                    <div key={c.name} className="hero-tile" style={c.photo
                        ? { backgroundImage: `linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)), url(${c.photo})`, backgroundSize: "cover", backgroundPosition: "center" }
                        : { background: `${c.color}` }} onClick={() => setActiveCat(c.name)}>
                      {!c.photo && <span style={{ fontSize: 34 }}>{c.emoji}</span>}
                      <span>{c.short}</span>
                    </div>
                  ))}
                </div>
              </section>

              {deals.length > 0 && (
                <section className="flash">
                  <div className="flash-head">
                    <h2>⚡ Ventes Flash</h2>
                    <span className="flash-timer">Offres limitées</span>
                  </div>
                  <div className="grid">
                    {deals.map((p) => <ProductCard key={p.id} p={p} onOpen={setModal} onAdd={addToCart} />)}
                  </div>
                </section>
              )}
            </React.Fragment>
          )}

          <section className="catalog">
            <div className="catalog-head">
              <h2>{search ? `Résultats pour "${search}"` : activeCat === "Tout" ? "Tous les produits" : activeCat} <span className="count">({filtered.length})</span></h2>
              <div className="filters">
                <select value={segment} onChange={(e) => setSegment(e.target.value)}>
                  <option value="Tout">Tous · Particuliers &amp; Gros</option>
                  <option value="B2C">Particuliers (B2C)</option>
                  <option value="B2B">Vente en gros (B2B)</option>
                </select>
                <select value={sort} onChange={(e) => setSort(e.target.value)}>
                  <option value="populaire">Plus populaires</option>
                  <option value="prix-bas">Prix croissant</option>
                  <option value="prix-haut">Prix décroissant</option>
                  <option value="promo">Meilleures promos</option>
                </select>
              </div>
            </div>
            <div className="grid">
              {filtered.map((p) => <ProductCard key={p.id} p={p} onOpen={setModal} onAdd={addToCart} />)}
            </div>
            {filtered.length === 0 && <div className="empty">Aucun produit trouvé. Essayez un autre mot-clé.</div>}
          </section>
        </React.Fragment>
      )}

      <footer className="footer">
        <div className="footer-grid">
          <div>
            <div className="logo"><img className="brand-logo" src="logo-maiko-couleur.png" alt="MaïkoMarket" style={{height:48}} /></div>
            <p className="foot-p">La plateforme de commerce international qui connecte les fabricants chinois aux commerçants et familles d'Afrique de l'Ouest.</p>
          </div>
          <div><h4>Vendre &amp; Livrer</h4><p><a href="devenir-fournisseur.html" style={{color:"inherit",textDecoration:"none"}}>Devenir fournisseur</a></p><p><a href="devenir-cargo.html" style={{color:"inherit",textDecoration:"none"}}>Devenir transporteur</a></p><p><a href="admin.html" style={{color:"inherit",textDecoration:"none"}}>Espace admin</a></p></div>
          <div><h4>Aide</h4><p>Suivi de commande</p><p>Livraison &amp; douanes</p><p>Retours</p><p>Nous contacter</p></div>
          <div><h4>Paiement</h4><p>Mobile Money</p><p>Carte bancaire</p><p>Paiement à la livraison</p><p>Virement (gros volumes)</p></div>
        </div>
        <div className="foot-bottom">© 2026 MaïkoMarket · Chine ↔ Bénin &amp; Nigeria</div>
      </footer>

      <ProductModal p={modal} onClose={() => setModal(null)} onAdd={addToCart} />
      <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} setItems={setCart}
        onCheckout={() => { setCartOpen(false); setCheckout(true); }} />
      {checkout && <Checkout items={cart} profil={profil} onClose={() => setCheckout(false)} onDone={() => setCart([])} />}
      {accountOpen && <AccountModal sb={sb} onClose={()=>setAccountOpen(false)} onAuth={()=>{}} />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
