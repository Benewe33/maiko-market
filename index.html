"OUI","repeat":false},{"id":"B2B-86","name":"Chariots de transport","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":228554,"oldPrice":297120,"discount":30,"rating":4.4,"sold":47430,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-87","name":"Tentes et parasols marché","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":109524,"oldPrice":175238,"discount":60,"rating":4.7,"sold":50000,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-88","name":"Tables pliantes en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":103120,"oldPrice":123744,"discount":20,"rating":4.7,"sold":535,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-89","name":"Chaises plastique en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":118213,"oldPrice":135944,"discount":15,"rating":4.7,"sold":431,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-90","name":"Équipements médicaux de base","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":152216,"oldPrice":228324,"discount":50,"rating":4.7,"sold":67930,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-91","name":"Tensiomètres en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":80400,"oldPrice":112560,"discount":40,"rating":4.4,"sold":641,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-92","name":"Thermomètres en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":131403,"oldPrice":170823,"discount":30,"rating":4.8,"sold":70220,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-93","name":"Masques médicaux en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":64286,"oldPrice":102857,"discount":60,"rating":4.8,"sold":87000,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-94","name":"Gants médicaux en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":12589,"oldPrice":15106,"discount":20,"rating":4.3,"sold":60620,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-95","name":"Désinfectants en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":52554,"oldPrice":63064,"discount":20,"rating":4.6,"sold":28000,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-96","name":"Produits d'entretien en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":13036,"oldPrice":14991,"discount":15,"rating":4.7,"sold":71630,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-97","name":"Détergents et savons en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":46263,"oldPrice":69394,"discount":50,"rating":4.3,"sold":382,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-98","name":"Eau de javel en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":202770,"oldPrice":0,"discount":0,"rating":4.7,"sold":82590,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-99","name":"Papier A4 en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":164141,"oldPrice":279039,"discount":70,"rating":4.4,"sold":93940,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false},{"id":"B2B-100","name":"Fournitures bureau en gros","category":"COMMERCE & DISTRIBUTION","segment":"B2B","price":34069,"oldPrice":47696,"discount":40,"rating":4.7,"sold":77000,"emoji":"🛒","color":"#F9C74F","renta":"OUI","repeat":false}];

const CATEGORIES = [
  { name: "BEAUTÉ & SOINS", short: "Beauté", emoji: "💄", color: "#F2789F" },
  { name: "MODE & VÊTEMENTS", short: "Mode", emoji: "👗", color: "#9B5DE5" },
  { name: "ÉLECTRONIQUE & HIGH-TECH", short: "High-Tech", emoji: "📱", color: "#00BBF9" },
  { name: "MAISON & CUISINE", short: "Maison", emoji: "🍳", color: "#FF8C42" },
  { name: "OUTILS & CONSTRUCTION", short: "Outils", emoji: "🔧", color: "#6C757D" },
  { name: "AGRICULTURE & ÉLEVAGE", short: "Agriculture", emoji: "🌾", color: "#43AA8B" },
  { name: "INDUSTRIE & ÉQUIPEMENTS", short: "Industrie", emoji: "🏭", color: "#577590" },
  { name: "COMMERCE & DISTRIBUTION", short: "Commerce", emoji: "🛒", color: "#F9C74F" },
];

const fmt = (n) => new Intl.NumberFormat("fr-FR").format(n) + " FCFA";
const fmtSold = (n) => (n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0", "") + "k" : n);

function Stars({ rating }) {
  return (
    <span style={{ color: "#FF7B00", fontSize: 12, letterSpacing: -1 }}>
      {"★".repeat(Math.round(rating))}
      <span style={{ color: "#E0E0E0" }}>{"★".repeat(5 - Math.round(rating))}</span>
    </span>
  );
}

function ProductCard({ p, onOpen, onAdd }) {
  return (
    <div className="card" onClick={() => onOpen(p)}>
      <div className="card-img" style={{ background: `linear-gradient(135deg, ${p.color}22, ${p.color}44)` }}>
        <span className="card-emoji">{p.emoji}</span>
        {p.discount > 0 && <span className="badge-disc">-{p.discount}%</span>}
        {p.segment === "B2B" && <span className="badge-b2b">GROS</span>}
      </div>
      <div className="card-body">
        <div className="card-name">{p.name}</div>
        <div className="card-rate">
          <Stars rating={p.rating} />
          <span className="card-sold">{fmtSold(p.sold)} vendus</span>
        </div>
        <div className="card-price-row">
          <div>
            <span className="card-price">{fmt(p.price)}</span>
            {p.oldPrice > 0 && <span className="card-old">{fmt(p.oldPrice)}</span>}
          </div>
          <button className="add-btn" onClick={(e) => { e.stopPropagation(); onAdd(p); }}>+</button>
        </div>
      </div>
    </div>
  );
}

function ProductModal({ p, onClose, onAdd }) {
  const [qty, setQty] = useState(1);
  if (!p) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-img" style={{ background: `linear-gradient(135deg, ${p.color}22, ${p.color}55)` }}>
          <span style={{ fontSize: 120 }}>{p.emoji}</span>
        </div>
        <div className="modal-info">
          <div className="modal-cat">{p.category}{p.segment === "B2B" ? " · Vente en gros" : ""}</div>
          <h2 className="modal-name">{p.name}</h2>
          <div className="card-rate" style={{ marginBottom: 12 }}>
            <Stars rating={p.rating} />
            <span style={{ fontWeight: 700, color: "#333" }}>{p.rating}</span>
            <span className="card-sold">· {fmtSold(p.sold)} vendus</span>
          </div>
          <div className="modal-price">
            {fmt(p.price)}
            {p.oldPrice > 0 && <span className="card-old" style={{ fontSize: 16 }}>{fmt(p.oldPrice)}</span>}
            {p.discount > 0 && <span className="badge-disc" style={{ position: "static", marginLeft: 8 }}>-{p.discount}%</span>}
          </div>
          {p.repeat && <div className="modal-tag">🔁 Réapprovisionnement facile</div>}
          <div className="modal-tag" style={{ background: "#E8F5E9", color: "#2E7D32" }}>🚚 Livraison Chine → Afrique de l'Ouest · 7-15 jours</div>
          <div className="modal-tag" style={{ background: "#FFF3E0", color: "#E65100" }}>✓ Demande prouvée · Rentabilité {p.renta.toLowerCase()}</div>
          <div className="qty-row">
            <span style={{ fontWeight: 600 }}>Quantité</span>
            <div className="qty-ctrl">
              <button onClick={() => setQty(Math.max(1, qty - 1))}>−</button>
              <span>{qty}</span>
              <button onClick={() => setQty(qty + 1)}>+</button>
            </div>
          </div>
          <button className="buy-btn" onClick={() => { onAdd(p, qty); onClose(); }}>
            Ajouter au panier · {fmt(p.price * qty)}
          </button>
        </div>
      </div>
    </div>
  );
}

function CartDrawer({ open, items, onClose, setItems }) {
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const setQty = (id, q) => setItems(items.map((i) => (i.id === id ? { ...i, qty: q } : i)).filter((i) => i.qty > 0));
  return (
    <React.Fragment>
      <div className={`drawer-bg ${open ? "show" : ""}`} onClick={onClose} />
      <div className={`drawer ${open ? "open" : ""}`}>
        <div className="drawer-head">
          <h3>Mon panier ({items.reduce((s, i) => s + i.qty, 0)})</h3>
          <button className="modal-close" style={{ position: "static" }} onClick={onClose}>✕</button>
        </div>
        <div className="drawer-body">
          {items.length === 0 && <div className="empty">Votre panier est vide.<br />Découvrez nos 200 produits !</div>}
          {items.map((i) => (
            <div className="cart-item" key={i.id}>
              <div className="cart-thumb" style={{ background: `${i.color}33` }}>{i.emoji}</div>
              <div style={{ flex: 1 }}>
                <div className="cart-name">{i.name}</div>
                <div className="card-price">{fmt(i.price)}</div>
              </div>
              <div className="qty-ctrl small">
                <button onClick={() => setQty(i.id, i.qty - 1)}>−</button>
                <span>{i.qty}</span>
                <button onClick={() => setQty(i.id, i.qty + 1)}>+</button>
              </div>
            </div>
          ))}
        </div>
        {items.length > 0 && (
          <div className="drawer-foot">
            <div className="total-row"><span>Total</span><span className="total-val">{fmt(total)}</span></div>
            <button className="buy-btn" onClick={() => alert("Commande simulée ! Merci de votre achat 🎉")}>Passer la commande</button>
          </div>
        )}
      </div>
    </React.Fragment>
  );
}

function App() {
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState("Tout");
  const [segment, setSegment] = useState("Tout");
  const [sort, setSort] = useState("populaire");
  const [modal, setModal] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState("");

  const addToCart = (p, qty = 1) => {
    setCart((c) => {
      const ex = c.find((i) => i.id === p.id);
      if (ex) return c.map((i) => (i.id === p.id ? { ...i, qty: i.qty + qty } : i));
      return [...c, { ...p, qty }];
    });
    setToast(`✓ ${p.name} ajouté`);
    setTimeout(() => setToast(""), 1800);
  };

  const filtered = useMemo(() => {
    let r = PRODUCTS.filter((p) => {
      if (activeCat !== "Tout" && p.category !== activeCat) return false;
      if (segment !== "Tout" && p.segment !== segment) return false;
      if (search && !p.name.toLowerCase().includes(search.toLowerCase()) && !p.category.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
    if (sort === "prix-bas") r = [...r].sort((a, b) => a.price - b.price);
    else if (sort === "prix-haut") r = [...r].sort((a, b) => b.price - a.price);
    else if (sort === "promo") r = [...r].sort((a, b) => b.discount - a.discount);
    else r = [...r].sort((a, b) => b.sold - a.sold);
    return r;
  }, [activeCat, segment, search, sort]);

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const deals = useMemo(() => [...PRODUCTS].filter((p) => p.discount >= 40).sort((a, b) => b.discount - a.discount).slice(0, 6), []);

  return (
    <div className="app">
      <header className="topbar">
        <div className="topbar-inner">
          <div className="logo" onClick={() => { setActiveCat("Tout"); setSegment("Tout"); setSearch(""); }}>
            <span className="logo-mark">麦</span>
            <span className="logo-text">Maïko<span className="logo-accent">Market</span></span>
          </div>
          <div className="searchbar">
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Rechercher parmi 200 produits..." />
            <button className="search-btn">Rechercher</button>
          </div>
          <button className="cart-icon" onClick={() => setCartOpen(true)}>
            🛒{cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
        <div className="ticker">
          <span>🚚 Livraison directe Chine → Bénin &amp; Nigeria</span>
          <span>💰 Prix grossiste imbattables</span>
          <span>✓ Paiement à la livraison disponible</span>
          <span>📦 Plus de 200 produits sélectionnés</span>
        </div>
      </header>

      <nav className="catnav">
        <button className={activeCat === "Tout" ? "chip active" : "chip"} onClick={() => setActiveCat("Tout")}>🏠 Tout</button>
        {CATEGORIES.map((c) => (
          <button key={c.name} className={activeCat === c.name ? "chip active" : "chip"} onClick={() => setActiveCat(c.name)} style={activeCat === c.name ? { background: c.color, borderColor: c.color } : {}}>
            {c.emoji} {c.short}
          </button>
        ))}
      </nav>

      {activeCat === "Tout" && !search && (
        <React.Fragment>
          <section className="hero">
            <div className="hero-text">
              <div className="hero-eyebrow">CHINE → AFRIQUE DE L'OUEST</div>
              <h1>Les meilleurs produits, <br />directement au prix d'usine.</h1>
              <p>Beauté, high-tech, maison, agriculture, équipements pros — sélectionnés pour le marché béninois et nigérian.</p>
              <button className="hero-cta" onClick={() => setSort("promo")}>Voir les promotions 🔥</button>
            </div>
            <div className="hero-cards">
              {CATEGORIES.slice(0, 4).map((c) => (
                <div key={c.name} className="hero-tile" style={{ background: `${c.color}` }} onClick={() => setActiveCat(c.name)}>
                  <span style={{ fontSize: 34 }}>{c.emoji}</span>
                  <span>{c.short}</span>
                </div>
              ))}
            </div>
          </section>

          <section className="flash">
            <div className="flash-head">
              <h2>⚡ Ventes Flash</h2>
              <span className="flash-timer">Offres limitées</span>
            </div>
            <div className="grid">
              {deals.map((p) => <ProductCard key={p.id} p={p} onOpen={setModal} onAdd={addToCart} />)}
            </div>
          </section>
        </React.Fragment>
      )}

      <section className="catalog">
        <div className="catalog-head">
          <h2>{search ? `Résultats pour "${search}"` : activeCat === "Tout" ? "Tous les produits" : activeCat} <span className="count">({filtered.length})</span></h2>
          <div className="filters">
            <select value={segment} onChange={(e) => setSegment(e.target.value)}>
              <option value="Tout">Tous · Particuliers &amp; Gros</option>
              <option value="B2C">Particuliers (B2C)</option>
              <option value="B2B">Vente en gros (B2B)</option>
            </select>
            <select value={sort} onChange={(e) => setSort(e.target.value)}>
              <option value="populaire">Plus populaires</option>
              <option value="prix-bas">Prix croissant</option>
              <option value="prix-haut">Prix décroissant</option>
              <option value="promo">Meilleures promos</option>
            </select>
          </div>
        </div>
        <div className="grid">
          {filtered.map((p) => <ProductCard key={p.id} p={p} onOpen={setModal} onAdd={addToCart} />)}
        </div>
        {filtered.length === 0 && <div className="empty">Aucun produit trouvé. Essayez un autre mot-clé.</div>}
      </section>

      <footer className="footer">
        <div className="footer-grid">
          <div>
            <div className="logo"><span className="logo-mark">麦</span><span className="logo-text">Maïko<span className="logo-accent">Market</span></span></div>
            <p className="foot-p">La plateforme de commerce international qui connecte les fabricants chinois aux commerçants et familles d'Afrique de l'Ouest.</p>
          </div>
          <div><h4>Acheter</h4><p>Particuliers</p><p>Vente en gros</p><p>Ventes flash</p><p>Nouveautés</p></div>
          <div><h4>Aide</h4><p>Suivi de commande</p><p>Livraison &amp; douanes</p><p>Retours</p><p>Nous contacter</p></div>
          <div><h4>Paiement</h4><p>Mobile Money</p><p>Carte bancaire</p><p>Paiement à la livraison</p><p>Virement (gros volumes)</p></div>
        </div>
        <div className="foot-bottom">© 2026 MaïkoMarket · Démo e-commerce · Chine ↔ Bénin &amp; Nigeria</div>
      </footer>

      <ProductModal p={modal} onClose={() => setModal(null)} onAdd={addToCart} />
      <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} setItems={setCart} />
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
