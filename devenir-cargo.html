<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo-maiko-icone.png">
<title>Devenir transporteur — MaïkoMarket</title>
<style>* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", system-ui, sans-serif; background: linear-gradient(135deg,#1A1A1A,#3a1d10); min-height: 100vh; color: #1A1A1A; }
.wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
.box { background: #fff; border-radius: 18px; padding: 36px; width: 100%; max-width: 440px; }
.logo { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 6px; }
.brand-logo { height: 46px; }
.box h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
.box .sub { font-size: 13.5px; color: #888; text-align: center; margin-bottom: 22px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
.field input { width: 100%; border: 1.5px solid #E2E2E8; border-radius: 10px; padding: 11px 13px; font-size: 14px; outline: none; }
.field input:focus { border-color: #FF6A00; }
.btn { width: 100%; background: linear-gradient(135deg,#FF6A00,#FF2D78); color: #fff; border: none; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.err { background: #FFEBEE; color: #C62828; padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
.ok-box { text-align: center; padding: 16px 0; }
.ok-box .ico { font-size: 56px; }
.ok-box h2 { margin: 10px 0; }
.ok-box p { color: #666; font-size: 14px; line-height: 1.6; }
.foot { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
.foot a { color: #FF6A00; text-decoration: none; font-weight: 600; }
.switch { text-align: center; margin-top: 14px; font-size: 13.5px; }
.switch a { color: #FF6A00; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const { useState } = React;
const sb = supabase.createClient("https://hvziqwjgnwkgutrdsify.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2emlxd2pnbndrZ3V0cmRzaWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTIxMjAsImV4cCI6MjA5NzI2ODEyMH0.AYicxr7MC-ho8tzwjOUkfq4c7cDzCO_HZYiV2d5P0lk");
const ROLE = "cargo";

function App() {
  const [mode, setMode] = useState("inscription"); // inscription | connexion
  const [f, setF] = useState({ nom:"", email:"", telephone:"", entreprise:"", password:"" });
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const set = (k,v) => setF({...f,[k]:v});

  const inscrire = async () => {
    setErr("");
    if (!f.nom || !f.email || !f.password) { setErr("Nom, email et mot de passe sont obligatoires."); return; }
    if (f.password.length < 6) { setErr("Le mot de passe doit faire au moins 6 caractères."); return; }
    setBusy(true);
    try {
      const { data, error } = await sb.auth.signUp({ email: f.email, password: f.password });
      if (error) throw error;
      const uid = data.user?.id;
      if (uid) {
        // Mettre à jour le profil créé automatiquement : rôle + statut en attente + infos
        const { error: e2 } = await sb.from("profils").update({
          role: ROLE, statut: "en_attente",
          nom: f.nom, email: f.email, telephone: f.telephone, entreprise: f.entreprise
        }).eq("id", uid);
        if (e2) throw e2;
      }
      setDone(true);
    } catch (e) {
      setErr(e.message || String(e));
    }
    setBusy(false);
  };

  const connecter = async () => {
    setErr(""); setBusy(true);
    const { data, error } = await sb.auth.signInWithPassword({ email: f.email, password: f.password });
    setBusy(false);
    if (error) { setErr("Identifiants incorrects."); return; }
    // Vérifier le rôle et le statut
    const { data: prof } = await sb.from("profils").select("role,statut").eq("id", data.user.id).single();
    if (!prof || prof.role !== ROLE) { setErr("Ce compte n'est pas un compte cargo."); await sb.auth.signOut(); return; }
    if (prof.statut === "en_attente") { setErr("Votre compte est en cours de validation par notre équipe."); await sb.auth.signOut(); return; }
    if (prof.statut !== "actif") { setErr("Votre compte n'est pas actif. Contactez-nous."); await sb.auth.signOut(); return; }
    window.location.href = "cargo.html";
  };

  if (done) {
    return (
      <div className="wrap"><div className="box">
        <div className="ok-box">
          <div className="ico">✅</div>
          <h2>Inscription envoyée !</h2>
          <p>Merci {f.nom}. Votre demande a bien été reçue.<br/>
          Notre équipe va examiner votre compte. Vous pourrez vous connecter dès qu'il sera validé.</p>
          <div className="switch" style={{marginTop:18}}><a onClick={()=>{setDone(false);setMode("connexion");}}>Aller à la connexion</a></div>
        </div>
      </div></div>
    );
  }

  return (
    <div className="wrap"><div className="box">
      <div className="logo"><img className="brand-logo" src="logo-maiko-couleur.png" alt="MaïkoMarket" /></div>
      <h1>Devenir transporteur</h1>
      <div className="sub">Assurez les livraisons MaïkoMarket</div>
      {err && <div className="err">{err}</div>}
      {mode === "inscription" ? (
        <React.Fragment>
          <div className="field"><label>Nom complet</label><input value={f.nom} onChange={(e)=>set("nom",e.target.value)} /></div>
          <div className="field"><label>Nom de l'entreprise</label><input value={f.entreprise} onChange={(e)=>set("entreprise",e.target.value)} /></div>
          <div className="field"><label>Téléphone</label><input value={f.telephone} onChange={(e)=>set("telephone",e.target.value)} placeholder="+229 ..." /></div>
          <div className="field"><label>Email</label><input type="email" value={f.email} onChange={(e)=>set("email",e.target.value)} /></div>
          <div className="field"><label>Mot de passe</label><input type="password" value={f.password} onChange={(e)=>set("password",e.target.value)} /></div>
          <button className="btn" disabled={busy} onClick={inscrire}>{busy?"Envoi…":"Créer mon compte"}</button>
          <div className="switch">Déjà inscrit ? <a onClick={()=>{setMode("connexion");setErr("");}}>Se connecter</a></div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="field"><label>Email</label><input type="email" value={f.email} onChange={(e)=>set("email",e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&connecter()} /></div>
          <div className="field"><label>Mot de passe</label><input type="password" value={f.password} onChange={(e)=>set("password",e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&connecter()} /></div>
          <button className="btn" disabled={busy} onClick={connecter}>{busy?"Connexion…":"Se connecter"}</button>
          <div className="switch">Pas encore de compte ? <a onClick={()=>{setMode("inscription");setErr("");}}>S'inscrire</a></div>
        </React.Fragment>
      )}
      <div className="foot"><a href="index.html">← Retour à la boutique</a></div>
    </div></div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
